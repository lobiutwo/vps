name: Windows VPS mit Ngrok RDP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    # 1. RDP auf dem Windows-Server aktivieren & Firewall öffnen
    - name: 1. RDP aktivieren
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        New-NetFirewallRule -DisplayName "RDP-Inbound" -Direction Inbound -Action Allow -Protocol TCP -LocalPort 3389

    # 2. Ngrok herunterladen und entpacken
    - name: 2. Ngrok installieren
      run: |
        Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNy7a2qHSTp/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip"
        Expand-Archive -Path "ngrok.zip" -DestinationPath .

    # 3. Deinen Ngrok Token aktivieren
    - name: 3. Ngrok authentifizieren
      run: |
        # ERSETZE DIE PUNKTE HIER MIT DEINEM ECHTEN TOKEN VON DER WEBSITE!
        .\ngrok.exe config add-authtoken 3F6f3XbpLZcoMBVsRds725oizQm_6FehQUjtEgSJ1fV3PA6Me

    # 4. Den echten TCP-Tunnel auf Port 3389 starten
    - name: 4. RDP Tunnel starten
      run: |
        Start-Process .\ngrok.exe -ArgumentList "tcp 3389" -RedirectStandardOutput "ngrok.log" -WindowStyle Hidden
        Start-Sleep -Seconds 15

    # 5. Die Adresse für dein Tablet auslesen
    - name: 5. Deine Verbindungsdaten anzeigen
      run: |
        Write-Host "===================================================="
        Write-Host "DEINE REINE RDP-ADRESSE:"
        
        # Holt sich die offizielle TCP-Adresse von Ngrok aus dem Web-Interface
        $ngrok_url = (Invoke-WebRequest -Uri "http://127.0.0.1:4040/api/tunnels" -UseBasicParsing | ConvertFrom-Json).tunnels.public_url
        if ($ngrok_url) {
            # Entfernt das "tcp://" am Anfang, damit die App es versteht
            $clean_url = $ngrok_url -replace "tcp://", ""
            Write-Host "Kopiere diese Adresse in die Microsoft RDP App:"
            Write-Host "$clean_url"
        } else {
            Write-Host "Tunnel startet noch oder Token fehlt. Warte kurz..."
        }
        Write-Host "===================================================="

    # 6. Administrator-Passwort für Windows setzen
    - name: 6. Windows Admin-Passwort setzen
      run: |
        net user runneradmin "MeinSicheresPasswort123!"

    # 7. Server online halten
    - name: 7. Server aktiv halten Loop
      run: |
        $count = 0
        while ($count -lt 360) {
            Start-Sleep -Seconds 60
            $count++
        }
