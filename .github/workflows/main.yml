name: Windows VPS mit ngrok (Zuerst ngrok)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    # 1. ngrok über Chocolatey installieren
    - name: 1. ngrok herunterladen und installieren
      run: |
        choco install ngrok -y
        
    # 2. ngrok authentifizieren
    - name: 2. ngrok Token konfigurieren
      env:
        NGROK_AUTH: ${{ secrets.NGROK_AUTHTOKEN }}
      run: |
        ngrok config add-authtoken "$env:NGROK_AUTH"

    # 3. Tunnel starten und die Adresse direkt in eine Logdatei schreiben lassen
    - name: 3. ngrok Tunnel starten & Adresse sichern
      run: |
        # Startet den RDP-Tunnel und schreibt alle Statusmeldungen direkt in 'ngrok.log'
        Start-Process ngrok -ArgumentList "tcp 3389 --log=stdout" -RedirectStandardOutput "ngrok.log" -WindowStyle Hidden
        # Gemütliche 15 Sekunden warten, damit ngrok die Verbindung aufbauen kann
        Start-Sleep -Seconds 15

    # 4. Die Adresse direkt aus der Textdatei auslesen (Keine API-Abfrage mehr!)
    - name: 4. Deine Verbindungsdaten anzeigen
      run: |
        Write-Host "===================================================="
        Write-Host "DEIN TUNNEL WIRD AUSGELESEN..."
        
        # Holt sich die Zeile mit der Adresse 'tcp://...' aus dem Log
        $url = Get-Content ngrok.log | Select-String -Pattern "url=tcp://"
        if ($url) {
            # Schneidet den Text sauber zurecht, sodass nur die Adresse übrig bleibt
            $clean_url = ($url -split "url=")[1]
            Write-Host "DEIN TUNNEL IST BEREIT!"
            Write-Host "Verbinde dich ueber RDP mit dieser Adresse:"
            Write-Host "$clean_url"
        } else {
            Write-Host "Tunnel konnte nicht ausgelesen werden. Zeige rohes Log zur Fehlersuche:"
            Get-Content ngrok.log
        }
        Write-Host "===================================================="

    # 5. Admin-Passwort für den Windows-Server festlegen
    - name: 5. Windows Admin-Passwort setzen
      run: |
        net user runneradmin "MeinSicheresPasswort123!"

    # 6. Endlosschleife hält den Server online
    - name: 6. Server aktiv halten (Loop)
      run: |
        Write-Host "Der Server läuft jetzt. Du kannst dich verbinden!"
        $count = 0
        while ($count -lt 360) {
            Start-Sleep -Seconds 60
            $count++
            Write-Host "Server läuft seit $count Minuten."
        }
