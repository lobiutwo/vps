name: Windows VPS mit Pinggy (Final Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    # 1. Verzeichnis erstellen und SSH-Key generieren
    - name: 1. SSH Schlüssel generieren
      run: |
        if (!(Test-Path "$env:USERPROFILE\.ssh")) { New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.ssh" }
        ssh-keygen -t rsa -b 2048 -f "$env:USERPROFILE\.ssh\id_rsa" -N ""

    # 2. Windows Remotedesktop aktivieren und Firewall öffnen
    - name: 2. RDP auf Windows aktivieren
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

    # 3. Den Pinggy-Tunnel ganz normal starten (Jetzt korrigiert!)
    - name: 3. Pinggy RDP-Tunnel starten
      run: |
        # Wir nutzen wieder den korrekten Hostnamen 'a.pinggy.io' auf Port 443
        Start-Process ssh -ArgumentList "-o StrictHostKeyChecking=no -p 443 -R 0:localhost:3389 rdp@a.pinggy.io" -RedirectStandardOutput "pinggy.log" -WindowStyle Hidden
        Start-Sleep -Seconds 15

    # 4. Die Verbindungsdaten direkt aus dem Log anzeigen
    - name: 4. Deine Verbindungsdaten anzeigen
      run: |
        Write-Host "===================================================="
        Write-Host "DEIN TUNNEL IST BEREIT!"
        Start-Sleep -Seconds 2
        
        $log = Get-Content pinggy.log
        $port_line = $log | Select-String -Pattern "Allocated port"
        if ($port_line) {
            $port = ($port_line -split "Allocated port ")[1] -split " " | Select-Object -First 1
            Write-Host "Trage diese Adresse in die Microsoft RDP App ein:"
            Write-Host "a.pinggy.io:$port"
        } else {
            Write-Host "Zeige rohes Log zur manuellen Suche:"
            $log
        }
        Write-Host "===================================================="

    # 5. Admin-Passwort für den Windows-Server festlegen
    - name: 5. Windows Admin-Passwort setzen
      run: |
        net user runneradmin "MeinSicheresPasswort123!"

    # 6. Endlosschleife hält den Server online
    - name: 6. Server aktiv halten (Loop)
      run: |
        Write-Host "Der Server läuft jetzt. Du kannst dich verbinden!"
        $count = 0
        while ($count -lt 360) {
            Start-Sleep -Seconds 60
            $count++
            Write-Host "Server läuft seit $count Minuten."
        }
