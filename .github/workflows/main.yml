name: Windows VPS Pinggy Token

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: 1. SSH Verzeichnis und Key erstellen
      run: |
        if (!(Test-Path "$env:USERPROFILE\.ssh")) { New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.ssh" }
        ssh-keygen -t rsa -b 2048 -f "$env:USERPROFILE\.ssh\id_rsa" -N ""

    - name: 2. RDP aktivieren
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        New-NetFirewallRule -DisplayName "RDP-Inbound" -Direction Inbound -Action Allow -Protocol TCP -LocalPort 3389

    - name: 3. Pinggy Tunnel starten
      run: |
        Start-Process ssh -ArgumentList "-o StrictHostKeyChecking=no -o ServerAliveInterval=30 -p 443 -R 0:localhost:3389 BrrtAggU59V@free.pinggy.io" -RedirectStandardOutput "pinggy.log" -WindowStyle Hidden
        Start-Sleep -Seconds 15

    - name: 4. Verbindungsdaten ausgeben
      run: |
        Write-Host "===================================================="
        Get-Content pinggy.log
        Write-Host "===================================================="

    - name: 5. Admin-Passwort setzen
      run: |
        net user runneradmin "MeinSicheresPasswort123!"

    - name: 6. Server aktiv halten Loop
      run: |
        $count = 0
        while ($count -lt 360) {
            Start-Sleep -Seconds 60
            $count++
        }
