name: Windows VPS mit Pinggy (Keine Kreditkarte noetig)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    # 1. SSH-Key generieren (Pinggy braucht das zur Authentifizierung)
    - name: 1. SSH Schlüssel generieren
      run: |
        ssh-keygen -t rsa -b 2048 -f "$env:USERPROFILE\.ssh\id_rsa" -N ""

    # 2. Den Pinggy-Tunnel im Hintergrund starten
    - name: 2. Pinggy RDP-Tunnel starten
      run: |
        # Startet den Tunnel für Port 3389 (Windows RDP) über Pinggy und loggt in eine Datei
        Start-Process ssh -ArgumentList "-o StrictHostKeyChecking=no -p 443 -R 0:localhost:3389 rdp@a.pinggy.io" -RedirectStandardOutput "pinggy.log" -WindowStyle Hidden
        Start-Sleep -Seconds 10

    # 3. Die Verbindungsdaten direkt aus dem Log anzeigen
    - name: 3. Deine Verbindungsdaten anzeigen
      run: |
        Write-Host "===================================================="
        Write-Host "DEIN TUNNEL WIRD AUSGELESEN..."
        Start-Sleep -Seconds 5
        
        # Holt sich die öffentliche Adresse von Pinggy aus der Logdatei
        $pinggy_line = Get-Content pinggy.log | Select-String -Pattern "tcp://"
        if ($pinggy_line) {
            # Bereinigt den Text für die RDP-Adresse
            $clean_url = ($pinggy_line -split "tcp://")[1] -split " " | Select-Object -First 1
            Write-Host "DEIN TUNNEL IST BEREIT!"
            Write-Host "Verbinde dich ueber RDP mit dieser Adresse:"
            Write-Host "$clean_url"
        } else {
            Write-Host "Tunnel-Adresse konnte nicht ausgelesen werden. Rohes Log:"
            Get-Content pinggy.log
        }
        Write-Host "===================================================="

    # 4. Admin-Passwort für den Windows-Server festlegen
    - name: 4. Windows Admin-Passwort setzen
      run: |
        net user runneradmin "MeinSicheresPasswort123!"

    # 5. Endlosschleife hält den Server online
    - name: 5. Server aktiv halten (Loop)
      run: |
        Write-Host "Der Server läuft jetzt. Du kannst dich verbinden!"
        $count = 0
        while ($count -lt 360) {
            Start-Sleep -Seconds 60
            $count++
            Write-Host "Server läuft seit $count Minuten."
        }
