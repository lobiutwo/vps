name: Windows VPS Finale RDP Fix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    # 1. SSH-Key generieren
    - name: 1. SSH Verzeichnis und Key erstellen
      run: |
        if (!(Test-Path "$env:USERPROFILE\.ssh")) { New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.ssh" }
        ssh-keygen -t rsa -b 2048 -f "$env:USERPROFILE\.ssh\id_rsa" -N ""

    # 2. Windows Remotedesktop aktivieren
    - name: 2. RDP aktivieren
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        New-NetFirewallRule -DisplayName "RDP-Inbound" -Direction Inbound -Action Allow -Protocol TCP -LocalPort 3389

    # 3. Pinggy RDP-Tunnel über den RICHTIGEN TCP-Server starten
    - name: 3. Pinggy TCP Tunnel starten
      run: |
        # HIER STEHT JETZT @a.pinggy.io STATT @free.pinggy.io – DAS SCHALTET REINES TCP FREI!
        Start-Process ssh -ArgumentList "-o StrictHostKeyChecking=no -o ServerAliveInterval=30 -p 443 -R 0:localhost:3389 BrrtAggU59V@a.pinggy.io" -RedirectStandardOutput "pinggy.log" -WindowStyle Hidden
        Start-Sleep -Seconds 15

    # 4. Die echte Adresse für dein Tablet anzeigen
    - name: 4. Verbindungsdaten ausgeben
      run: |
        Write-Host "===================================================="
        Write-Host "DEIN WINDOWS SERVER IST BEREIT!"
        Start-Sleep -Seconds 2
        Get-Content pinggy.log
        Write-Host "===================================================="

    # 5. Windows-Passwort setzen
    - name: 5. Windows Admin-Passwort setzen
      run: |
        net user runneradmin "MeinSicheresPasswort123!"

    # 6. Server aktiv halten Loop
    - name: 6. Server aktiv halten Loop
      run: |
        $count = 0
        while ($count -lt 360) {
            Start-Sleep -Seconds 60
            $count++
        }
