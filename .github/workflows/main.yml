name: Windows VPS mit ngrok (Zuerst ngrok)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    # 1. ngrok über Chocolatey installieren
    - name: 1. ngrok herunterladen und installieren
      run: |
        choco install ngrok -y
        
    # 2. ngrok authentifizieren
    - name: 2. ngrok Token konfigurieren
      env:
        NGROK_AUTH: ${{ secrets.NGROK_AUTHTOKEN }}
      run: |
        ngrok config add-authtoken "$env:NGROK_AUTH"

    # 3. Eine feste Konfiguration schreiben und den Tunnel starten
    - name: 3. ngrok Tunnel im Hintergrund starten
      run: |
        # Startet den RDP-Tunnel sauber im Hintergrund
        Start-Process ngrok -ArgumentList "tcp 3389" -WindowStyle Hidden
        # Wir geben ngrok jetzt 30 Sekunden Zeit, um die API im Hintergrund komplett zu starten!
        Start-Sleep -Seconds 30

    # 4. Die Verbindungsdaten abfragen (Jetzt mit Sicherheitsnetz)
    - name: 4. Deine Verbindungsdaten anzeigen
      run: |
        # Falls ngrok immer noch lädt, versuchen wir es bis zu 3 Mal im Abstand von 5 Sekunden
        for ($i=0; $i -lt 3; $i++) {
          try {
            $ngrok_url = (Invoke-WebRequest -Uri "http://127.0.0.1:4040/api/tunnels" -UseBasicParsing -TimeoutSec 10 | ConvertFrom-Json).tunnels.public_url
            if ($ngrok_url) { break }
          } catch {
            Start-Sleep -Seconds 5
          }
        }
        
        Write-Host "===================================================="
        Write-Host "DEIN TUNNEL IST BEREIT!"
        Write-Host "Verbinde dich ueber RDP mit dieser Adresse:"
        Write-Host "$ngrok_url"
        Write-Host "===================================================="

    # 5. Admin-Passwort für den Windows-Server festlegen
    - name: 5. Windows Admin-Passwort setzen
      run: |
        net user runneradmin "MeinSicheresPasswort123!"
        cmd /c WMIC USERACCOUNT WHERE "Name='runneradmin'" SET PasswordExpires=FALSE

    # 6. Endlosschleife
    - name: 6. Server aktiv halten (Loop)
      run: |
        Write-Host "Der Server läuft jetzt. Du kannst dich verbinden!"
        $count = 0
        while ($count -lt 360) {
            Start-Sleep -Seconds 60
            $count++
            Write-Host "Server läuft seit $count Minuten."
        }
